<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, 'Segoe UI', 'Helvetica Neue', 'Meiryo', sans-serif;
    background: #fafafa;
    color: #1a1a1a;
    min-height: 100vh;
    display: flex;
  }

  /* ─── Sidebar ─── */
  .sidebar {
    width: 220px;
    background: #111;
    color: #e5e5e5;
    display: flex;
    flex-direction: column;
    position: fixed;
    top: 0;
    left: 0;
    bottom: 0;
    z-index: 10;
  }

  .sidebar-brand {
    padding: 28px 24px 24px;
    border-bottom: 1px solid #222;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .sidebar-brand img {
    width: 30px;
    height: 30px;
    object-fit: contain;
    /* original colors */
  }
  .sidebar-brand-text h2 {
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 0.5px;
    color: #fff;
    line-height: 1.1;
  }
  .sidebar-brand-text span {
    font-size: 8px;
    letter-spacing: 2.5px;
    color: #666;
    text-transform: uppercase;
  }

  .sidebar-nav {
    flex: 1;
    padding: 16px 0;
    overflow-y: auto;
  }
  .nav-group-label {
    padding: 12px 24px 6px;
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 2px;
    color: #555;
    text-transform: uppercase;
  }
  .nav-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 24px;
    text-decoration: none;
    color: #aaa;
    font-size: 13px;
    font-weight: 500;
    transition: all 0.12s;
    border-left: 2px solid transparent;
  }
  .nav-item:hover {
    color: #fff;
    background: rgba(255,255,255,0.04);
    border-left-color: #fff;
  }
  .nav-item svg {
    width: 16px;
    height: 16px;
    flex-shrink: 0;
    opacity: 0.5;
  }
  .nav-item:hover svg { opacity: 1; }

  .sidebar-footer {
    padding: 16px 24px;
    border-top: 1px solid #222;
    font-size: 10px;
    color: #444;
  }

  /* ─── Main ─── */
  .main {
    margin-left: 220px;
    flex: 1;
    min-height: 100vh;
  }

  .topbar {
    padding: 20px 40px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid #eee;
    background: #fff;
  }
  .topbar h1 {
    font-size: 18px;
    font-weight: 700;
    color: #111;
  }
  .topbar-time {
    font-size: 12px;
    color: #999;
    font-variant-numeric: tabular-nums;
  }

  .content {
    padding: 32px 40px;
  }

  /* ─── Shortcut Grid (Chrome-style) ─── */
  .card-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: flex-start;
  }

  .card {
    width: 112px;
    background: transparent;
    border: none;
    border-radius: 12px;
    padding: 16px 8px 12px;
    text-decoration: none;
    color: #1a1a1a;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    transition: background 0.15s;
  }
  .card:hover {
    background: #f0f0f0;
  }

  .card-icon {
    width: 48px;
    height: 48px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .card-icon svg {
    width: 22px;
    height: 22px;
  }

  .card-label {
    font-size: 12px;
    font-weight: 400;
    color: #555;
    text-align: center;
    line-height: 1.3;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    max-width: 100%;
  }

  /* subtle icon bg */
  .ic-red    { background: #fef2f2; }
  .ic-green  { background: #f0fdf4; }
  .ic-blue   { background: #eff6ff; }
  .ic-violet { background: #f5f3ff; }
  .ic-teal   { background: #f0fdfa; }
  .ic-sky    { background: #f0f9ff; }
  .ic-orange { background: #fff7ed; }
  .ic-amber  { background: #fffbeb; }
  .ic-pink   { background: #fdf2f8; }

  .ic-red    svg { stroke: #dc2626; }
  .ic-green  svg { stroke: #16a34a; }
  .ic-blue   svg { stroke: #2563eb; }
  .ic-violet svg { stroke: #7c3aed; }
  .ic-teal   svg { stroke: #0d9488; }
  .ic-sky    svg { stroke: #0284c7; }
  .ic-orange svg { stroke: #ea580c; }
  .ic-amber  svg { stroke: #d97706; }
  .ic-pink   svg { stroke: #db2777; }
</style>

function updateClock() {
  const now = new Date();
  const full = now.toLocaleString('ja-JP', { year:'numeric', month:'2-digit', day:'2-digit', weekday:'short', hour:'2-digit', minute:'2-digit' });
  document.getElementById('topbarTime').textContent = full;
  document.getElementById('footerTime').textContent = now.toLocaleString('ja-JP', { month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit' });
}
updateClock();
setInterval(updateClock, 60000);
</script>
